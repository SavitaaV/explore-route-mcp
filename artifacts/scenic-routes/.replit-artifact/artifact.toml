kind = "web"
previewPath = "/"
title = "Scenic Routes MCP"
version = "1.0.0"
id = "artifacts/scenic-routes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18319

[services.development]
run = "pnpm --filter @workspace/scenic-routes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scenic-routes", "run", "build" ]
publicDir = "artifacts/scenic-routes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18319"
BASE_PATH = "/"
