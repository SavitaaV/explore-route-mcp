openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Scenic Routes MCP API – foot/bike discovery in Niagara-on-the-Lake powered by Google Maps + Claude
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scenic
    description: Scenic route and merchant discovery
  - name: mcp
    description: MCP tool protocol
  - name: anthropic
    description: Anthropic AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scenic-route:
    get:
      operationId: getScenicRoute
      tags: [scenic]
      summary: Get scenic walking/biking route within Niagara-on-the-Lake
      parameters:
        - name: origin
          in: query
          required: true
          schema:
            type: string
        - name: destination
          in: query
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
          description: Travel mode - walking or bicycling (default walking)
      responses:
        "200":
          description: Route with encoded polyline and waypoints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenicRoute"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchants:
    get:
      operationId: getMerchants
      tags: [scenic]
      summary: Get nearby merchants along the walking route
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lng
          in: query
          required: true
          schema:
            type: number
        - name: radius
          in: query
          required: false
          schema:
            type: number
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Nearby merchants with Shopify checkout
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Merchant"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchant-card:
    post:
      operationId: getMerchantCard
      tags: [scenic]
      summary: Get merchant card with Shopify checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MerchantCardRequest"
      responses:
        "200":
          description: Merchant card with products and checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantCard"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /merchant-graph:
    get:
      operationId: getMerchantGraph
      tags: [scenic]
      summary: Get merchant co-purchase similarity graph
      parameters:
        - name: minSimilarity
          in: query
          required: false
          schema:
            type: number
          description: Minimum edge similarity threshold (default 0.25)
        - name: merchantTypes
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated merchant type filter
      responses:
        "200":
          description: Force-directed graph of merchant similarity nodes and edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantGraph"

  /plan-discovery-route:
    get:
      operationId: planDiscoveryRoute
      tags: [scenic]
      summary: Plan an intent-based discovery route via Google Places + nearest-neighbour ordering
      parameters:
        - name: intent
          in: query
          required: true
          schema:
            type: string
          description: Discovery intent (e.g. "wine tour", "farmers market", "artisan shops")
        - name: city
          in: query
          required: false
          schema:
            type: string
          description: Ontario city name to geocode (e.g. "Niagara-on-the-Lake")
        - name: lat
          in: query
          required: false
          schema:
            type: number
          description: Latitude of search centre (alternative to city)
        - name: lng
          in: query
          required: false
          schema:
            type: number
          description: Longitude of search centre (alternative to city)
        - name: radius
          in: query
          required: false
          schema:
            type: number
          description: Search radius in metres (default 2000)
      responses:
        "200":
          description: Discovery route with nearest-neighbour ordered merchants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRoute"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mcp-tools:
    get:
      operationId: getMcpTools
      tags: [mcp]
      summary: List available MCP tools
      responses:
        "200":
          description: MCP tool definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/McpTool"

  /anthropic/conversations:
    get:
      operationId: listAnthropicConversations
      tags: [anthropic]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicConversation"
    post:
      operationId: createAnthropicConversation
      tags: [anthropic]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnthropicConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversation"

  /anthropic/conversations/{id}:
    get:
      operationId: getAnthropicConversation
      tags: [anthropic]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"
    delete:
      operationId: deleteAnthropicConversation
      tags: [anthropic]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnthropicError"

  /anthropic/conversations/{id}/messages:
    get:
      operationId: listAnthropicMessages
      tags: [anthropic]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnthropicMessage"
    post:
      operationId: sendAnthropicMessage
      tags: [anthropic]
      summary: Send a message and receive an AI response (SSE stream)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendAnthropicMessageBody"
      responses:
        "200":
          description: SSE stream of assistant response chunks
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    RouteWaypoint:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
        name:
          type: ["string", "null"]
      required: [lat, lng, name]

    ScenicRoute:
      type: object
      properties:
        encodedPolyline:
          type: string
        distanceKm:
          type: number
        durationMinutes:
          type: number
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/RouteWaypoint"
        summary:
          type: string
        mapUrl:
          type: string
        mode:
          type: string
          description: walking or bicycling
      required: [encodedPolyline, distanceKm, durationMinutes, waypoints, summary, mapUrl, mode]

    MerchantProduct:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        price:
          type: string
        imageUrl:
          type: ["string", "null"]
        checkoutUrl:
          type: string
      required: [id, title, price, imageUrl, checkoutUrl]

    Merchant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        lat:
          type: number
        lng:
          type: number
        address:
          type: string
        rating:
          type: ["number", "null"]
        distanceFromRouteKm:
          type: ["number", "null"]
        photoUrl:
          type: ["string", "null"]
        description:
          type: string
        isOpen:
          type: ["boolean", "null"]
        walkMinutes:
          type: ["number", "null"]
          description: Minutes to walk from current position
        story:
          type: ["string", "null"]
          description: One-sentence human story about this merchant surfaced by the AI agent
        inventoryConfidence:
          type: ["number", "null"]
          description: 0-100 crowdsourced inventory confidence score, time-decayed
        recentVisitors:
          type: ["number", "null"]
          description: Number of explorers who verified inventory recently
        hoursAgoConfirmed:
          type: ["number", "null"]
          description: Hours since last crowdsourced inventory confirmation
        isOnShopify:
          type: boolean
          description: Whether this merchant has a Shopify store — false means digital twin candidate
      required: [id, name, type, lat, lng, address, rating, distanceFromRouteKm, photoUrl, description, isOpen, walkMinutes]

    MerchantCardRequest:
      type: object
      properties:
        merchantId:
          type: string
        merchantName:
          type: string
        merchantType:
          type: string
      required: [merchantId, merchantName, merchantType]

    MerchantCard:
      type: object
      properties:
        merchant:
          $ref: "#/components/schemas/Merchant"
        products:
          type: array
          items:
            $ref: "#/components/schemas/MerchantProduct"
        checkoutUrl:
          type: string
        hapticDistance:
          type: number
      required: [merchant, products, checkoutUrl, hapticDistance]

    McpTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
      required: [name, description, inputSchema]

    AnthropicConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, createdAt]

    AnthropicMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, conversationId, role, content, createdAt]

    CreateAnthropicConversationBody:
      type: object
      properties:
        title:
          type: string
      required: [title]

    SendAnthropicMessageBody:
      type: object
      properties:
        content:
          type: string
        routeContext:
          type: object
          description: MCP route context injected from Scenic Routes
        merchantContext:
          type: array
          description: Nearby merchants from MCP
          items:
            type: object
        userPosition:
          type: object
          description: Current user lat/lng position on route
      required: [content]

    AnthropicConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/AnthropicMessage"
      required: [id, title, createdAt, messages]

    MerchantNode:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        rating:
          type: ["number", "null"]
        lat:
          type: number
        lng:
          type: number
        photoUrl:
          type: ["string", "null"]
        topTags:
          type: array
          items:
            type: string
        avgPrice:
          type: ["number", "null"]
      required: [id, name, type, rating, lat, lng, topTags]

    MerchantEdge:
      type: object
      properties:
        sourceId:
          type: string
        targetId:
          type: string
        score:
          type: number
          description: 0–1 combined similarity score (type affinity + proximity + catalog overlap)
        proximityM:
          type: number
          description: Distance between merchant locations in metres
        distanceKm:
          type: number
          description: Distance between merchant locations in kilometres
        affinityReason:
          type: string
          description: Human-readable reason for the affinity (e.g. "winery × restaurant")
        sharedCategories:
          type: array
          items:
            type: string
          description: Shopify catalog categories shared by both merchants
        catalogOverlap:
          type: number
          description: Jaccard overlap of catalog categories (0–1)
      required: [sourceId, targetId, score, proximityM, distanceKm, affinityReason, sharedCategories, catalogOverlap]

    MerchantGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/MerchantNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/MerchantEdge"
      required: [nodes, edges]

    AnthropicError:
      type: object
      properties:
        error:
          type: string
      required: [error]

    DiscoveryMerchant:
      type: object
      properties:
        placeId:
          type: string
        name:
          type: string
        type:
          type: string
        lat:
          type: number
        lng:
          type: number
        vicinity:
          type: string
        rating:
          type: ["number", "null"]
        userRatingsTotal:
          type: number
        distanceFromStartKm:
          type: number
        shopifyStatus:
          type: string
          enum: [verified, ghost]
        isEvent:
          type: boolean
        chainTier:
          type: string
        openNow:
          type: ["boolean", "null"]
        photoUrl:
          type: ["string", "null"]
        checkoutUrl:
          type: ["string", "null"]
        operatingSeason:
          type: ["string", "null"]
          description: Human-readable operating season (e.g. "Saturdays, May–October · 8am–1pm") — populated for farmer_market and market types
        upcomingDates:
          type: array
          items:
            type: string
          nullable: true
          description: ISO date strings for upcoming event occurrences — populated for isEvent=true merchants
        weekdayText:
          type: array
          items:
            type: string
          nullable: true
          description: Human-readable hours per weekday from Google Place Details (e.g. "Monday: 9:00 AM – 5:00 PM") — null when unavailable
      required: [placeId, name, type, lat, lng, vicinity, rating, userRatingsTotal, distanceFromStartKm, shopifyStatus, isEvent, chainTier, openNow]

    DiscoveryRoute:
      type: object
      properties:
        intent:
          type: string
        resolvedLocation:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
            name:
              type: string
          required: [lat, lng, name]
        merchants:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryMerchant"
        totalDistanceKm:
          type: number
        estimatedWalkMinutes:
          type: number
        source:
          type: string
          enum: [google, mock]
      required: [intent, resolvedLocation, merchants, totalDistanceKm, estimatedWalkMinutes, source]
